<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTC Sunburst & Treemap Explorer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
    .header{text-align:center;padding:18px 16px 6px}
    .header h1{font-size:1.5rem;background:linear-gradient(135deg,#34d399,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header p{color:#64748b;font-size:.85rem;margin-top:3px}
    .tabs{display:flex;justify-content:center;gap:4px;padding:10px 16px}
    .tab{padding:8px 20px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:.85rem;transition:all .2s}
    .tab:hover{background:#334155}
    .tab.active{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#0a0e1a;border-color:transparent;font-weight:600}
    .controls{display:flex;justify-content:center;gap:8px;padding:6px 16px 10px;flex-wrap:wrap}
    .controls button,.controls select{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:.8rem;cursor:pointer;transition:all .2s}
    .controls button:hover{background:#334155}
    .btn-p{background:linear-gradient(135deg,#38bdf8,#818cf8)!important;color:#0a0e1a!important;border:none!important;font-weight:600}
    .btn-d{background:linear-gradient(135deg,#f87171,#fb923c)!important;color:#0a0e1a!important;border:none!important;font-weight:600}
    .btn-g{background:linear-gradient(135deg,#34d399,#22d3ee)!important;color:#0a0e1a!important;border:none!important;font-weight:600}
    .stats{display:flex;gap:10px;justify-content:center;padding:0 16px 8px;flex-wrap:wrap}
    .st{background:#1e293b;border-radius:8px;padding:5px 14px;font-size:.75rem;color:#94a3b8;text-align:center}
    .st .v{font-size:1rem;font-weight:700;color:#e2e8f0}
    .st .v.g{color:#34d399}.st .v.r{color:#f87171}.st .v.b{color:#38bdf8}.st .v.p{color:#a78bfa}
    .main{display:flex;height:calc(100vh - 210px);min-height:480px}
    .viz{flex:1;position:relative;overflow:hidden}
    .viz canvas{display:block}
    .side{width:300px;background:#111827;border-left:1px solid #1e293b;overflow-y:auto;padding:14px;flex-shrink:0}
    .side h3{font-size:.9rem;color:#38bdf8;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .breadcrumb{display:flex;gap:4px;padding:0 16px 6px;flex-wrap:wrap;align-items:center}
    .crumb{padding:3px 10px;border-radius:6px;font-size:.75rem;background:#1e293b;color:#94a3b8;cursor:pointer;transition:all .2s}
    .crumb:hover{background:#334155}
    .crumb.current{color:#38bdf8;border:1px solid #38bdf8}
    .crumb-sep{color:#475569;font-size:.7rem}
    .detail-card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid #38bdf8;font-size:.78rem;line-height:1.6}
    .detail-card.rev{border-left-color:#f87171;background:#1c1520}
    .detail-card .domain{font-weight:600;color:#e2e8f0;font-size:.88rem}
    .detail-card .meta{color:#64748b;margin-top:3px}
    .tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600;margin-top:4px}
    .tag.valid{background:#064e3b;color:#34d399}
    .tag.revoked{background:#450a0a;color:#f87171}
    .tag.pq{background:#1e1b4b;color:#a78bfa}
    .tag.classical{background:#172554;color:#60a5fa}
    .tip{position:fixed;background:#1e293b;border:1px solid #475569;border-radius:10px;padding:12px 16px;font-size:.8rem;color:#e2e8f0;pointer-events:none;z-index:200;display:none;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5);line-height:1.6}
    .legend-row{display:flex;gap:12px;justify-content:center;padding:6px 16px;flex-wrap:wrap}
    .leg{display:flex;align-items:center;gap:5px;font-size:.73rem;color:#94a3b8}
    .leg-c{width:12px;height:12px;border-radius:3px}
    .empty-msg{text-align:center;color:#475569;padding:40px 20px;font-size:.9rem}
    @media(max-width:768px){.main{flex-direction:column;height:auto}.side{width:100%;border-left:none;border-top:1px solid #1e293b;max-height:300px}.viz{min-height:400px}}
  </style>
</head>
<body>
  <div class="header">
    <h1>🌿 MTC Sunburst & Treemap Explorer</h1>
    <p>Visualizing millions of Merkle Tree Certificates — drill down from CA → Batch → Algorithm → Certificate</p>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabSunburst" onclick="switchView('sunburst')">☀️ Sunburst</div>
    <div class="tab" id="tabTreemap" onclick="switchView('treemap')">🗺️ Treemap</div>
  </div>
  <div class="controls">
    <select id="scaleSelect" onchange="regenerate()">
      <option value="500">500 certs</option>
      <option value="2000" selected>2,000 certs</option>
      <option value="5000">5,000 certs</option>
      <option value="10000">10,000 certs</option>
    </select>
    <button class="btn-p" onclick="regenerate()">🔄 Regenerate</button>
    <button class="btn-d" onclick="revokeWave()">🚫 Revocation Wave</button>
    <button class="btn-g" onclick="drillUp()">⬆ Drill Up</button>
    <button onclick="resetView()">✖ Reset</button>
    <select id="colorMode" onchange="redraw()">
      <option value="status">Color: Trust Status</option>
      <option value="algorithm">Color: Key Algorithm</option>
      <option value="age">Color: Certificate Age</option>
    </select>
  </div>
  <div class="stats" id="statsBar"></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="legend-row" id="legendRow"></div>
  <div class="main">
    <div class="viz" id="vizPanel"><canvas id="canvas"></canvas></div>
    <div class="side">
      <h3 id="sideTitle">📊 Details</h3>
      <div id="sideContent"></div>
    </div>
  </div>
  <div class="tip" id="tip"></div>

  <script>
  // ─── CONFIG ───
  const CAS = [
    {name:"Let's Encrypt",color:"#34d399",weight:0.35},
    {name:"DigiCert",color:"#38bdf8",weight:0.18},
    {name:"Sectigo",color:"#818cf8",weight:0.15},
    {name:"Google Trust Services",color:"#fbbf24",weight:0.14},
    {name:"Cloudflare",color:"#fb923c",weight:0.08},
    {name:"GlobalSign",color:"#f472b6",weight:0.05},
    {name:"Entrust",color:"#a78bfa",weight:0.03},
    {name:"ZeroSSL",color:"#22d3ee",weight:0.02}
  ];
  const ALGOS = ["ML-DSA-44","ML-DSA-65","ECDSA-P256","Ed25519","RSA-2048"];
  const ALGO_WEIGHTS = [0.30,0.10,0.35,0.15,0.10];
  const TLDS = [".com",".org",".net",".io",".dev",".app",".co",".me",".cloud",".security"];
  const WORDS = ["cloud","secure","fast","edge","api","auth","data","web","app","net","core","hub","link","sync","flow","gate","node","mesh","grid","vault","key","cert","trust","proxy","cdn","dns","ssl","tls","pki","crypto"];
  const BATCH_HOURS = [0,6,12,18];

  let allCerts = [];
  let revokedSet = new Set();
  let hierarchy = null; // {name, children, certs, ...}
  let drillPath = []; // breadcrumb
  let currentNode = null;
  let viewMode = 'sunburst';
  let hoveredSegment = null;
  let segments = []; // rendered segments for hit-testing

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // ─── DATA GENERATION ───
  function randomDomain(){
    const w1=WORDS[Math.floor(Math.random()*WORDS.length)];
    const w2=WORDS[Math.floor(Math.random()*WORDS.length)];
    const tld=TLDS[Math.floor(Math.random()*TLDS.length)];
    return w1+(Math.random()>.5?'-':'')+w2+tld;
  }
  function weightedPick(items,weights){
    let r=Math.random(),cum=0;
    for(let i=0;i<items.length;i++){cum+=weights[i];if(r<=cum)return items[i];}
    return items[items.length-1];
  }
  function generateData(){
    const n=parseInt(document.getElementById('scaleSelect').value);
    allCerts=[];revokedSet.clear();
    const now=Date.now();
    for(let i=0;i<n;i++){
      const ca=weightedPick(CAS,CAS.map(c=>c.weight));
      const algo=weightedPick(ALGOS,ALGO_WEIGHTS);
      const age=Math.random()*14;
      const issued=new Date(now-age*86400000);
      const batchHour=BATCH_HOURS[Math.floor(Math.random()*BATCH_HOURS.length)];
      const batchDate=new Date(issued);batchDate.setHours(batchHour,0,0,0);
      const batchLabel=batchDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+String(batchHour).padStart(2,'0')+':00';
      allCerts.push({
        index:i,
        domain:randomDomain(),
        ca:ca.name,
        caColor:ca.color,
        algo,
        issued,
        age,
        batchLabel,
        isPQ:algo.startsWith('ML-')||algo.startsWith('SLH-'),
      });
    }
    // Pre-revoke ~2%
    const revCount=Math.floor(n*0.02);
    for(let i=0;i<revCount;i++){revokedSet.add(Math.floor(Math.random()*n));}
    buildHierarchy();
  }

  function buildHierarchy(){
    // CA → Batch → Algo → Certs
    const root={name:"All CAs",children:[],level:0,path:["All CAs"]};
    const caMap={};
    allCerts.forEach(c=>{
      if(!caMap[c.ca])caMap[c.ca]={name:c.ca,children:[],certs:[],color:c.caColor,level:1,path:["All CAs",c.ca]};
      caMap[c.ca].certs.push(c);
    });
    Object.values(caMap).sort((a,b)=>b.certs.length-a.certs.length).forEach(ca=>{
      const batchMap={};
      ca.certs.forEach(c=>{
        if(!batchMap[c.batchLabel])batchMap[c.batchLabel]={name:c.batchLabel,children:[],certs:[],color:ca.color,level:2,path:[...ca.path,c.batchLabel]};
        batchMap[c.batchLabel].certs.push(c);
      });
      Object.values(batchMap).sort((a,b)=>b.certs.length-a.certs.length).forEach(batch=>{
        const algoMap={};
        batch.certs.forEach(c=>{
          if(!algoMap[c.algo])algoMap[c.algo]={name:c.algo,children:[],certs:[],color:ca.color,level:3,path:[...batch.path,c.algo]};
          algoMap[c.algo].certs.push(c);
        });
        batch.children=Object.values(algoMap).sort((a,b)=>b.certs.length-a.certs.length);
        ca.children.push(batch);
      });
      root.children.push(ca);
    });
    hierarchy=root;
    currentNode=root;
    drillPath=[root];
  }

  function getAllCertsUnder(node){
    if(node.certs&&node.certs.length)return node.certs;
    let result=[];
    (node.children||[]).forEach(ch=>result=result.concat(getAllCertsUnder(ch)));
    return result;
  }

  // ─── COLORS ───
  function certColor(cert){
    const mode=document.getElementById('colorMode').value;
    const rev=revokedSet.has(cert.index);
    if(mode==='status'){
      if(rev)return {fill:'#991b1b',stroke:'#f87171',glow:'#f8717140'};
      return {fill:'#065f46',stroke:'#34d399',glow:'#34d39930'};
    }
    if(mode==='algorithm'){
      if(cert.isPQ)return {fill:rev?'#4a1942':'#312e81',stroke:rev?'#f87171':'#a78bfa',glow:'#a78bfa30'};
      return {fill:rev?'#4a1942':'#172554',stroke:rev?'#f87171':'#60a5fa',glow:'#60a5fa30'};
    }
    // age
    const t=Math.min(cert.age/14,1);
    const r=Math.round(52+t*200),g=Math.round(211-t*160),b=Math.round(153-t*100);
    return {fill:rev?'#991b1b':`rgb(${Math.round(r*.25)},${Math.round(g*.25)},${Math.round(b*.25)})`,stroke:rev?'#f87171':`rgb(${r},${g},${b})`,glow:`rgba(${r},${g},${b},0.2)`};
  }
  function groupColor(node,alpha=1){
    if(node.color)return node.color;
    const certs=getAllCertsUnder(node);
    if(certs.length&&certs[0].caColor)return certs[0].caColor;
    return '#475569';
  }
  function revRatio(node){
    const certs=getAllCertsUnder(node);
    if(!certs.length)return 0;
    return certs.filter(c=>revokedSet.has(c.index)).length/certs.length;
  }

  // ─── SUNBURST ───
  function drawSunburst(){
    const W=canvas.width/devicePixelRatio, H=canvas.height/devicePixelRatio;
    const cx=W/2, cy=H/2;
    const maxR=Math.min(W,H)/2-30;
    const node=currentNode;
    const children=node.children||[];
    if(!children.length){drawLeafGrid();return;}

    segments=[];
    const total=children.reduce((s,ch)=>s+getAllCertsUnder(ch).length,0);
    if(!total){ctx.fillStyle='#475569';ctx.textAlign='center';ctx.fillText('No data',cx,cy);return;}

    // Center circle
    const innerR=maxR*0.18;
    ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);
    ctx.fillStyle='#1e293b';ctx.fill();
    ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#e2e8f0';ctx.font='bold 13px system-ui';ctx.textAlign='center';
    ctx.fillText(node.name,cx,cy-6);
    ctx.fillStyle='#94a3b8';ctx.font='11px system-ui';
    ctx.fillText(`${total.toLocaleString()} certs`,cx,cy+12);

    // Ring 1: children
    let angle=-Math.PI/2;
    const gap=0.008;
    children.forEach((ch,i)=>{
      const chCerts=getAllCertsUnder(ch);
      const sweep=(chCerts.length/total)*Math.PI*2-gap;
      if(sweep<=0)return;
      const r1=innerR+6, r2=maxR*0.48;
      const rr=revRatio(ch);
      const baseColor=groupColor(ch);

      // Main arc
      ctx.beginPath();ctx.arc(cx,cy,r2,angle,angle+sweep);ctx.arc(cx,cy,r1,angle+sweep,angle,true);ctx.closePath();
      const grad=ctx.createRadialGradient(cx,cy,r1,cx,cy,r2);
      grad.addColorStop(0,baseColor+'40');grad.addColorStop(1,baseColor+'90');
      ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=baseColor;ctx.lineWidth=1;ctx.stroke();

      // Revoked overlay
      if(rr>0){
        ctx.beginPath();ctx.arc(cx,cy,r2,angle,angle+sweep*rr);ctx.arc(cx,cy,r1,angle+sweep*rr,angle,true);ctx.closePath();
        ctx.fillStyle='#f8717150';ctx.fill();
        ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;ctx.stroke();
      }

      // Label
      const midA=angle+sweep/2;
      const labelR=(r1+r2)/2;
      const lx=cx+Math.cos(midA)*labelR, ly=cy+Math.sin(midA)*labelR;
      if(sweep>0.15){
        ctx.save();ctx.translate(lx,ly);
        let rot=midA;if(rot>Math.PI/2||rot<-Math.PI/2)rot+=Math.PI;
        ctx.rotate(rot);
        ctx.fillStyle='#e2e8f0';ctx.font=`${Math.min(11,Math.max(7,sweep*30))}px system-ui`;ctx.textAlign='center';
        const label=ch.name.length>18?ch.name.slice(0,16)+'…':ch.name;
        ctx.fillText(label,0,0);
        ctx.fillStyle='#94a3b8';ctx.font=`${Math.min(9,Math.max(6,sweep*22))}px system-ui`;
        ctx.fillText(chCerts.length.toLocaleString(),0,12);
        ctx.restore();
      }

      segments.push({type:'arc',cx,cy,r1,r2,startAngle:angle,endAngle:angle+sweep,node:ch,certs:chCerts});

      // Ring 2: sub-children
      if(ch.children&&ch.children.length){
        const r3=maxR*0.48+4, r4=maxR*0.72;
        let subAngle=angle;
        const subTotal=chCerts.length;
        ch.children.forEach(sub=>{
          const subCerts=getAllCertsUnder(sub);
          const subSweep=(subCerts.length/subTotal)*sweep-gap*0.5;
          if(subSweep<=0.005){subAngle+=subSweep+gap*0.5;return;}
          const subRR=revRatio(sub);
          ctx.beginPath();ctx.arc(cx,cy,r4,subAngle,subAngle+subSweep);ctx.arc(cx,cy,r3,subAngle+subSweep,subAngle,true);ctx.closePath();
          const sg=ctx.createRadialGradient(cx,cy,r3,cx,cy,r4);
          sg.addColorStop(0,baseColor+'25');sg.addColorStop(1,baseColor+'55');
          ctx.fillStyle=sg;ctx.fill();
          ctx.strokeStyle=baseColor+'80';ctx.lineWidth=0.5;ctx.stroke();
          if(subRR>0){
            ctx.beginPath();ctx.arc(cx,cy,r4,subAngle,subAngle+subSweep*subRR);ctx.arc(cx,cy,r3,subAngle+subSweep*subRR,subAngle,true);ctx.closePath();
            ctx.fillStyle='#f8717140';ctx.fill();
          }
          if(subSweep>0.08){
            const smA=subAngle+subSweep/2;
            const slr=(r3+r4)/2;
            const sx=cx+Math.cos(smA)*slr,sy=cy+Math.sin(smA)*slr;
            ctx.save();ctx.translate(sx,sy);
            let sr=smA;if(sr>Math.PI/2||sr<-Math.PI/2)sr+=Math.PI;
            ctx.rotate(sr);
            ctx.fillStyle='#cbd5e1';ctx.font=`${Math.min(9,Math.max(6,subSweep*25))}px system-ui`;ctx.textAlign='center';
            ctx.fillText(sub.name.length>14?sub.name.slice(0,12)+'…':sub.name,0,0);
            ctx.restore();
          }
          segments.push({type:'arc',cx,cy,r1:r3,r2:r4,startAngle:subAngle,endAngle:subAngle+subSweep,node:sub,certs:subCerts});
          subAngle+=subSweep+gap*0.5;
        });
      }

      // Ring 3: outer glow for PQ ratio
      const r5=maxR*0.74, r6=maxR*0.82;
      const pqRatio=chCerts.filter(c=>c.isPQ).length/chCerts.length;
      if(pqRatio>0){
        ctx.beginPath();ctx.arc(cx,cy,r6,angle,angle+sweep*pqRatio);ctx.arc(cx,cy,r5,angle+sweep*pqRatio,angle,true);ctx.closePath();
        ctx.fillStyle='#a78bfa30';ctx.fill();
        ctx.strokeStyle='#a78bfa60';ctx.lineWidth=0.5;ctx.stroke();
      }

      angle+=sweep+gap;
    });

    // Outer ring label
    ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.textAlign='center';
    ctx.fillText('Outer glow = Post-Quantum algorithm ratio',cx,cy+maxR*0.9);
  }

  // ─── TREEMAP ───
  function drawTreemap(){
    const W=canvas.width/devicePixelRatio, H=canvas.height/devicePixelRatio;
    const node=currentNode;
    const children=node.children||[];
    if(!children.length){drawLeafGrid();return;}

    segments=[];
    const items=children.map(ch=>({node:ch,certs:getAllCertsUnder(ch),value:getAllCertsUnder(ch).length})).filter(x=>x.value>0);
    const total=items.reduce((s,x)=>s+x.value,0);

    // Squarified treemap layout
    const rects=squarify(items.map(x=>x.value),{x:8,y:8,w:W-16,h:H-16});

    items.forEach((item,i)=>{
      const r=rects[i];if(!r)return;
      const rr=revRatio(item.node);
      const baseColor=groupColor(item.node);
      const pad=2;

      // Background
      ctx.fillStyle=baseColor+'20';
      ctx.strokeStyle=baseColor+'80';
      ctx.lineWidth=1.5;
      roundRect(ctx,r.x+pad,r.y+pad,r.w-pad*2,r.h-pad*2,6);
      ctx.fill();ctx.stroke();

      // Revoked portion (bottom strip)
      if(rr>0){
        const stripH=Math.max(3,(r.h-pad*2)*rr);
        ctx.fillStyle='#f8717130';
        roundRect(ctx,r.x+pad,r.y+r.h-pad-stripH,r.w-pad*2,stripH,0);
        ctx.fill();
        ctx.strokeStyle='#f87171';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(r.x+pad,r.y+r.h-pad-stripH);ctx.lineTo(r.x+r.w-pad,r.y+r.h-pad-stripH);ctx.stroke();
      }

      // PQ indicator bar (top)
      const pqR=item.certs.filter(c=>c.isPQ).length/item.certs.length;
      if(pqR>0&&r.w>30){
        const barW=(r.w-pad*2-8)*pqR;
        ctx.fillStyle='#a78bfa50';
        roundRect(ctx,r.x+pad+4,r.y+pad+4,barW,4,2);ctx.fill();
      }

      // Labels
      if(r.w>50&&r.h>30){
        ctx.fillStyle='#e2e8f0';ctx.font=`bold ${Math.min(14,Math.max(9,r.w/12))}px system-ui`;ctx.textAlign='left';
        const name=item.node.name.length>Math.floor(r.w/8)?item.node.name.slice(0,Math.floor(r.w/8)-1)+'…':item.node.name;
        ctx.fillText(name,r.x+pad+6,r.y+pad+22);
        ctx.fillStyle='#94a3b8';ctx.font=`${Math.min(11,Math.max(7,r.w/14))}px system-ui`;
        ctx.fillText(`${item.certs.length.toLocaleString()} certs`,r.x+pad+6,r.y+pad+36);
        if(rr>0.001&&r.h>50){
          ctx.fillStyle='#f87171';
          ctx.fillText(`${(rr*100).toFixed(1)}% revoked`,r.x+pad+6,r.y+pad+49);
        }
      }

      // Mini cert dots if space
      if(r.w>80&&r.h>70){
        const dotArea={x:r.x+pad+6,y:r.y+pad+56,w:r.w-pad*2-12,h:r.h-pad*2-62};
        if(dotArea.h>10){
          const dotSize=Math.max(2,Math.min(5,Math.sqrt(dotArea.w*dotArea.h/item.certs.length)*0.6));
          const cols=Math.floor(dotArea.w/(dotSize+1));
          const maxDots=Math.min(item.certs.length,cols*Math.floor(dotArea.h/(dotSize+1)));
          for(let d=0;d<maxDots;d++){
            const col=d%cols,row=Math.floor(d/cols);
            const dx=dotArea.x+col*(dotSize+1);
            const dy=dotArea.y+row*(dotSize+1);
            if(dy+dotSize>dotArea.y+dotArea.h)break;
            const cert=item.certs[d];
            const cc=certColor(cert);
            ctx.fillStyle=revokedSet.has(cert.index)?'#f87171':cc.stroke;
            ctx.fillRect(dx,dy,dotSize,dotSize);
          }
        }
      }

      segments.push({type:'rect',x:r.x+pad,y:r.y+pad,w:r.w-pad*2,h:r.h-pad*2,node:item.node,certs:item.certs});
    });
  }

  function drawLeafGrid(){
    const W=canvas.width/devicePixelRatio, H=canvas.height/devicePixelRatio;
    const certs=getAllCertsUnder(currentNode);
    segments=[];
    if(!certs.length){ctx.fillStyle='#475569';ctx.textAlign='center';ctx.font='14px system-ui';ctx.fillText('No certificates',W/2,H/2);return;}

    const pad=12;
    const area=(W-pad*2)*(H-pad*2);
    const dotSize=Math.max(3,Math.min(16,Math.sqrt(area/certs.length)*0.75));
    const cols=Math.floor((W-pad*2)/(dotSize+2));

    certs.forEach((cert,i)=>{
      const col=i%cols, row=Math.floor(i/cols);
      const x=pad+col*(dotSize+2);
      const y=pad+row*(dotSize+2);
      if(y+dotSize>H)return;
      const cc=certColor(cert);
      const rev=revokedSet.has(cert.index);

      ctx.fillStyle=cc.fill;ctx.strokeStyle=cc.stroke;ctx.lineWidth=rev?2:0.5;
      ctx.beginPath();ctx.roundRect(x,y,dotSize,dotSize,2);ctx.fill();ctx.stroke();

      if(rev&&dotSize>5){
        ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(x+2,y+2);ctx.lineTo(x+dotSize-2,y+dotSize-2);
        ctx.moveTo(x+dotSize-2,y+2);ctx.lineTo(x+2,y+dotSize-2);ctx.stroke();
      }

      segments.push({type:'rect',x,y,w:dotSize,h:dotSize,node:null,cert,certs:[cert]});
    });
  }

  // ─── SQUARIFY ───
  function squarify(values,rect){
    const total=values.reduce((s,v)=>s+v,0);
    const rects=[];
    let remaining=[...values.map((v,i)=>({v,i}))];
    let {x,y,w,h}=rect;

    while(remaining.length){
      const isWide=w>=h;
      const side=isWide?h:w;
      let row=[],rowSum=0;
      const areaLeft=remaining.reduce((s,r)=>s+r.v,0);

      for(let i=0;i<remaining.length;i++){
        const test=[...row,remaining[i]];
        const testSum=rowSum+remaining[i].v;
        const testArea=(testSum/total)*(rect.w*rect.h);
        const rowLen=testArea/side;
        const worst=Math.max(...test.map(t=>{
          const s=(t.v/testSum)*side;
          return Math.max(rowLen/s,s/rowLen);
        }));
        if(row.length&&worst>Math.max(...row.map(t=>{
          const s=(t.v/rowSum)*side;
          const rl=(rowSum/total)*(rect.w*rect.h)/side;
          return Math.max(rl/s,s/rl);
        }))){break;}
        row.push(remaining[i]);rowSum+=remaining[i].v;
      }

      const rowArea=(rowSum/areaLeft)*(w*h);
      const rowLen=isWide?rowArea/h:rowArea/w;
      let offset=0;
      row.forEach(item=>{
        const frac=item.v/rowSum;
        const s=frac*side;
        if(isWide){
          rects[item.i]={x:x,y:y+offset,w:rowLen,h:s};
        }else{
          rects[item.i]={x:x+offset,y:y,w:s,h:rowLen};
        }
        offset+=s;
      });

      remaining=remaining.slice(row.length);
      if(isWide){x+=rowLen;w-=rowLen;}
      else{y+=rowLen;h-=rowLen;}
    }
    return rects;
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  }

  // ─── RENDER ───
  function resizeCanvas(){
    const panel=document.getElementById('vizPanel');
    canvas.width=panel.clientWidth*devicePixelRatio;
    canvas.height=panel.clientHeight*devicePixelRatio;
    canvas.style.width=panel.clientWidth+'px';
    canvas.style.height=panel.clientHeight+'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }

  function redraw(){
    resizeCanvas();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(viewMode==='sunburst')drawSunburst();
    else drawTreemap();
    renderLegend();
  }

  function renderStats(){
    const total=allCerts.length;
    const rev=revokedSet.size;
    const pq=allCerts.filter(c=>c.isPQ).length;
    const cas=new Set(allCerts.map(c=>c.ca)).size;
    document.getElementById('statsBar').innerHTML=`
      <div class="st"><div class="v b">${total.toLocaleString()}</div>Total Certs</div>
      <div class="st"><div class="v g">${(total-rev).toLocaleString()}</div>Valid</div>
      <div class="st"><div class="v r">${rev.toLocaleString()}</div>Revoked</div>
      <div class="st"><div class="v p">${pq.toLocaleString()}</div>Post-Quantum</div>
      <div class="st"><div class="v">${cas}</div>CAs</div>
      <div class="st"><div class="v">${((rev/total)*100).toFixed(2)}%</div>Revocation Rate</div>
    `;
  }

  function renderBreadcrumb(){
    document.getElementById('breadcrumb').innerHTML=drillPath.map((n,i)=>{
      const isCurrent=i===drillPath.length-1;
      return (i>0?'<span class="crumb-sep">›</span>':'')+
        `<span class="crumb ${isCurrent?'current':''}" onclick="drillTo(${i})">${n.name}</span>`;
    }).join('');
  }

  function renderLegend(){
    const mode=document.getElementById('colorMode').value;
    let items=[];
    if(mode==='status'){
      items=[{c:'#34d399',l:'Valid'},{c:'#f87171',l:'Revoked'}];
    }else if(mode==='algorithm'){
      items=[{c:'#a78bfa',l:'Post-Quantum (ML-DSA)'},{c:'#60a5fa',l:'Classical (ECDSA/Ed25519/RSA)'}];
    }else{
      items=[{c:'#34d399',l:'Fresh (0 days)'},{c:'#f59e0b',l:'Mid-life (~7 days)'},{c:'#f87171',l:'Expiring (~14 days)'}];
    }
    items.push({c:'#a78bfa40',l:'PQ Ratio (outer ring / top bar)'});
    document.getElementById('legendRow').innerHTML=items.map(i=>`<div class="leg"><div class="leg-c" style="background:${i.c}"></div>${i.l}</div>`).join('');
  }

  function renderSidePanel(node,certsList){
    const title=document.getElementById('sideTitle');
    const content=document.getElementById('sideContent');
    if(!node&&!certsList){
      title.textContent='📊 Overview';
      const caGroups={};
      allCerts.forEach(c=>{if(!caGroups[c.ca])caGroups[c.ca]={name:c.ca,color:c.caColor,total:0,revoked:0,pq:0};caGroups[c.ca].total++;if(revokedSet.has(c.index))caGroups[c.ca].revoked++;if(c.isPQ)caGroups[c.ca].pq++;});
      content.innerHTML=Object.values(caGroups).sort((a,b)=>b.total-a.total).map(g=>{
        const rr=g.total?((g.revoked/g.total)*100).toFixed(1):0;
        return `<div class="detail-card" style="border-left-color:${g.color}">
          <div class="domain">${g.name}</div>
          <div class="meta">${g.total.toLocaleString()} certs · ${g.pq} PQ · ${rr}% revoked</div>
          <span class="tag ${g.revoked?'revoked':'valid'}">${g.revoked?'🚫 '+g.revoked+' revoked':'✅ Clean'}</span>
          ${g.pq?` <span class="tag pq">🔮 ${((g.pq/g.total)*100).toFixed(0)}% PQ</span>`:''}
        </div>`;
      }).join('');
      return;
    }
    if(certsList&&certsList.length===1){
      const c=certsList[0];
      const rev=revokedSet.has(c.index);
      title.textContent='🔎 Certificate Detail';
      content.innerHTML=`<div class="detail-card ${rev?'rev':''}">
        <div class="domain">${c.domain}</div>
        <div class="meta">
          CA: ${c.ca}<br>
          Algorithm: ${c.algo} ${c.isPQ?'🔮 Post-Quantum':'📐 Classical'}<br>
          Issued: ${c.issued.toLocaleString()}<br>
          Batch: ${c.batchLabel}<br>
          Index: #${c.index}<br>
          Age: ${c.age.toFixed(1)} days
        </div>
        <span class="tag ${rev?'revoked':'valid'}">${rev?'🚫 REVOKED — Key Compromise':'✅ VALID'}</span>
        <span class="tag ${c.isPQ?'pq':'classical'}">${c.isPQ?'🔮 Post-Quantum':'📐 Classical'}</span>
      </div>`;
      return;
    }
    if(node){
      const certs=getAllCertsUnder(node);
      const rev=certs.filter(c=>revokedSet.has(c.index));
      const pq=certs.filter(c=>c.isPQ);
      title.textContent=`📂 ${node.name}`;
      let html=`<div class="detail-card">
        <div class="domain">${node.name}</div>
        <div class="meta">${certs.length.toLocaleString()} certificates<br>
        ${rev.length} revoked (${((rev.length/certs.length)*100).toFixed(1)}%)<br>
        ${pq.length} post-quantum (${((pq.length/certs.length)*100).toFixed(0)}%)</div>
      </div>`;
      // Show revoked certs
      if(rev.length){
        html+=`<h3 style="color:#f87171;margin:10px 0 6px">🚫 Revoked (${rev.length})</h3>`;
        rev.slice(0,20).forEach(c=>{
          html+=`<div class="detail-card rev"><div class="domain">${c.domain}</div><div class="meta">${c.ca} · ${c.algo} · #${c.index}</div><span class="tag revoked">🚫 REVOKED</span></div>`;
        });
        if(rev.length>20)html+=`<div style="color:#64748b;font-size:.75rem;padding:8px">…and ${rev.length-20} more</div>`;
      }
      content.innerHTML=html;
    }
  }

  // ─── INTERACTION ───
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    for(const seg of segments){
      if(seg.type==='rect'){
        if(mx>=seg.x&&mx<=seg.x+seg.w&&my>=seg.y&&my<=seg.y+seg.h){
          if(seg.cert){renderSidePanel(null,[seg.cert]);return;}
          if(seg.node&&seg.node.children&&seg.node.children.length){
            currentNode=seg.node;drillPath.push(seg.node);
            renderBreadcrumb();redraw();renderSidePanel(seg.node);return;
          }
          if(seg.node){renderSidePanel(seg.node);return;}
        }
      }else if(seg.type==='arc'){
        const dx=mx-seg.cx, dy=my-seg.cy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        let angle=Math.atan2(dy,dx);
        if(dist>=seg.r1&&dist<=seg.r2){
          let sa=seg.startAngle, ea=seg.endAngle;
          // Normalize
          while(angle<sa)angle+=Math.PI*2;
          if(angle<=ea){
            if(seg.node.children&&seg.node.children.length){
              currentNode=seg.node;drillPath.push(seg.node);
              renderBreadcrumb();redraw();renderSidePanel(seg.node);
            }else{renderSidePanel(seg.node);}
            return;
          }
        }
      }
    }
  });

  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const tip=document.getElementById('tip');
    let found=false;
    for(const seg of segments){
      let hit=false;
      if(seg.type==='rect'){
        hit=mx>=seg.x&&mx<=seg.x+seg.w&&my>=seg.y&&my<=seg.y+seg.h;
      }else if(seg.type==='arc'){
        const dx=mx-seg.cx,dy=my-seg.cy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        let angle=Math.atan2(dy,dx);
        if(dist>=seg.r1&&dist<=seg.r2){
          while(angle<seg.startAngle)angle+=Math.PI*2;
          hit=angle<=seg.endAngle;
        }
      }
      if(hit){
        found=true;
        canvas.style.cursor='pointer';
        let html='';
        if(seg.cert){
          const c=seg.cert;const rev=revokedSet.has(c.index);
          html=`<strong>${c.domain}</strong><br>${c.ca} · ${c.algo}<br>Batch: ${c.batchLabel}<br>${rev?'<span style="color:#f87171">🚫 REVOKED</span>':'<span style="color:#34d399">✅ Valid</span>'}`;
        }else if(seg.node){
          const certs=seg.certs||getAllCertsUnder(seg.node);
          const rev=certs.filter(c=>revokedSet.has(c.index)).length;
          const pq=certs.filter(c=>c.isPQ).length;
          html=`<strong>${seg.node.name}</strong><br>${certs.length.toLocaleString()} certs · ${rev} revoked (${((rev/certs.length)*100).toFixed(1)}%)<br>${pq} post-quantum<br><em style="color:#64748b">Click to drill down</em>`;
        }
        tip.innerHTML=html;
        tip.style.display='block';
        tip.style.left=Math.min(e.clientX+14,window.innerWidth-380)+'px';
        tip.style.top=(e.clientY-10)+'px';
        break;
      }
    }
    if(!found){canvas.style.cursor='default';tip.style.display='none';}
  });
  canvas.addEventListener('mouseleave',()=>{document.getElementById('tip').style.display='none';});

  // ─── ACTIONS ───
  function switchView(v){
    viewMode=v;
    document.getElementById('tabSunburst').classList.toggle('active',v==='sunburst');
    document.getElementById('tabTreemap').classList.toggle('active',v==='treemap');
    redraw();
  }
  function drillUp(){
    if(drillPath.length>1){drillPath.pop();currentNode=drillPath[drillPath.length-1];renderBreadcrumb();redraw();renderSidePanel(currentNode);}
  }
  function drillTo(idx){
    drillPath=drillPath.slice(0,idx+1);currentNode=drillPath[drillPath.length-1];renderBreadcrumb();redraw();renderSidePanel(currentNode);
  }
  function resetView(){
    currentNode=hierarchy;drillPath=[hierarchy];renderBreadcrumb();redraw();renderSidePanel(null);
  }
  function revokeWave(){
    const valid=allCerts.filter((_,i)=>!revokedSet.has(i));
    const count=Math.max(1,Math.floor(valid.length*0.05));
    const ca=CAS[Math.floor(Math.random()*3)].name;
    let revoked=0;
    for(const c of valid){
      if(c.ca===ca&&revoked<count){revokedSet.add(c.index);revoked++;}
      if(revoked>=count)break;
    }
    if(revoked===0){for(let i=0;i<Math.min(count,valid.length);i++)revokedSet.add(valid[i].index);}
    renderStats();redraw();
    renderSidePanel(currentNode);
  }
  function regenerate(){
    generateData();renderStats();renderBreadcrumb();redraw();renderSidePanel(null);
  }

  // Init
  window.addEventListener('resize',redraw);
  generateData();renderStats();renderBreadcrumb();redraw();renderSidePanel(null);
  </script>
</body>
</html>
