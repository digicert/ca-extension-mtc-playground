# MTC Bridge — Local Development Configuration

log:
  name: "mtc-bridge-dev"
  origin: "localhost/mtc-bridge"
  batch_size: 100

state_db:
  host: "localhost"
  port: 5433
  database: "mtcbridge"
  username: "mtcbridge"
  password: "mtcbridge"
  ssl_mode: "disable"
  max_open_conns: 10
  max_idle_conns: 3
  conn_max_lifetime: 5m

ca_db:
  host: "localhost"
  port: 3306
  database: "digicert_ca"
  username: "caadmin"
  password: "capassword"
  issuer_id: ""  # all CAs

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 30s
  tile_cache_ttl: 24h
  checkpoint_cache_ttl: 5s

watcher:
  poll_interval: 10s
  revocation_poll_interval: 30s
  checkpoint_interval: 60s
  batch_size: 500

cosigner:
  key_file: "keys/cosigner.key"
  key_id: "mtc-bridge-dev"

logging:
  level: "info"
  format: "json"
