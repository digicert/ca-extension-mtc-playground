# MTC Bridge — Local Development Configuration

log:
  name: "mtc-bridge-dev"
  origin: "localhost/mtc-bridge"
  batch_size: 100

state_db:
  host: "localhost"
  port: 5433
  database: "mtcbridge"
  username: "mtcbridge"
  password: "mtcbridge"
  ssl_mode: "disable"
  max_open_conns: 10
  max_idle_conns: 3
  conn_max_lifetime: 5m

ca_db:
  host: "localhost"
  port: 3306
  database: "digicert_ca"
  username: "caadmin"
  password: "capassword"
  issuer_id: ""  # all CAs

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 30s
  tile_cache_ttl: 24h
  checkpoint_cache_ttl: 5s

watcher:
  poll_interval: 10s
  revocation_poll_interval: 30s
  checkpoint_interval: 60s
  batch_size: 500

cosigner:
  key_file: "keys/cosigner.key"
  key_id: "mtc-bridge-dev"

logging:
  level: "info"
  format: "json"

assertion_issuer:
  # enabled: true  # default; set false to disable
  batch_size: 100
  concurrency: 4
  staleness_threshold: 5
  # webhooks:
  #   - url: "https://example.com/mtc-webhook"
  #     pattern: "*.example.com"
  #     secret: "webhook-secret"

acme:
  enabled: true
  addr: ":8443"
  external_url: "http://localhost:8443"
  ca_url: "http://localhost"
  ca_api_key: "${CA_API_KEY:-010d292eea2aae809fa845ff78a68a14e93c215489b46e3ffdea6603fe0a2db0517940327c8c2123e2da794baad0bf19a9}"
  ca_id: "${CA_ID:-}"
  template_id: "${CA_TEMPLATE_ID:-}"
  mtc_bridge_url: "http://localhost:8080"
  order_expiry: 24h
  assertion_timeout: 5m
  assertion_poll_interval: 5s
  auto_approve_challenge: true  # skip http-01 for internal CA
